<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#c96b48" />
    <title>Offline | WebSerbisyo RSVP Event</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fffaf4;
        --card: rgba(255, 255, 255, 0.94);
        --border: rgba(213, 187, 164, 0.42);
        --brand: #c96b48;
        --ink: #1f1a17;
        --muted: #78675d;
        --shadow: 0 24px 60px rgba(120, 84, 58, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "SF Pro Display", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        background:
          radial-gradient(circle at top, rgba(255, 229, 208, 0.78), transparent 48%),
          linear-gradient(180deg, #fffdf9 0%, var(--bg) 42%, #fff4ea 100%);
        color: var(--ink);
      }

      .shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px 18px;
      }

      .card {
        width: min(100%, 430px);
        border-radius: 30px;
        border: 1px solid var(--border);
        background: var(--card);
        box-shadow: var(--shadow);
        padding: 28px 24px 24px;
        text-align: center;
      }

      .logo-tile {
        width: 88px;
        height: 88px;
        margin: 0 auto;
        border-radius: 28px;
        border: 1px solid rgba(225, 198, 174, 0.8);
        background: linear-gradient(145deg, #fff7ef 0%, #ffe6d7 100%);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.88);
        overflow: hidden;
      }

      .logo-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .status-ring {
        width: 58px;
        height: 58px;
        margin: 18px auto 0;
        border-radius: 999px;
        background: linear-gradient(180deg, #fce8de 0%, #f9ddcf 100%);
        display: grid;
        place-items: center;
      }

      h1 {
        margin: 18px 0 0;
        font-size: clamp(2rem, 5vw, 2.35rem);
        line-height: 1;
        letter-spacing: -0.045em;
        font-weight: 900;
      }

      .message {
        margin: 14px auto 0;
        max-width: 34ch;
        color: var(--muted);
        font-size: 0.98rem;
        line-height: 1.7;
        font-weight: 600;
      }

      .actions {
        margin-top: 24px;
      }

      .button {
        width: 100%;
        border: 0;
        border-radius: 20px;
        padding: 14px 18px;
        background: linear-gradient(180deg, #d97a57 0%, var(--brand) 100%);
        color: #fff;
        font: inherit;
        font-size: 0.96rem;
        font-weight: 800;
        letter-spacing: 0.01em;
        box-shadow: 0 18px 30px rgba(201, 107, 72, 0.24);
        cursor: pointer;
      }

      .note {
        margin: 14px auto 0;
        max-width: 35ch;
        color: #9a8578;
        font-size: 0.86rem;
        line-height: 1.65;
        font-weight: 600;
      }

      .brand {
        margin-top: 18px;
        color: #b49a89;
        font-size: 0.75rem;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-labelledby="offline-title">
        <div class="logo-tile">
          <img class="logo-image" src="/images/brand/webserbisyo-logo.jpeg" alt="WebSerbisyo RSVP" width="88" height="88" />
        </div>
        <div class="status-ring" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M3.5 9.4C6.47 6.71 10.13 5.25 14 5.25C17.87 5.25 21.53 6.71 24.5 9.4M6.55 13.05C8.77 11.1 11.3 10.12 14 10.12C16.7 10.12 19.23 11.1 21.45 13.05M10.15 16.85C11.23 16.01 12.57 15.56 14 15.56C15.43 15.56 16.77 16.01 17.85 16.85M13.96 21.08H14.04M4.2 4.2L23.8 23.8"
              stroke="#C96B48"
              stroke-width="2.4"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <h1 id="offline-title">You&rsquo;re offline</h1>
        <p class="message">
          This WebSerbisyo RSVP custom invitation needs internet to load the latest event details and submit RSVP
          responses.
        </p>
        <div class="actions">
          <button class="button" type="button" id="retry-button">Try again</button>
        </div>
        <p class="note">Reconnect to refresh live event details before sharing or submitting an RSVP.</p>
        <p class="brand">WebSerbisyo RSVP</p>
      </section>
    </main>
    <script>
      const retryButton = document.getElementById("retry-button");

      if (retryButton) {
        retryButton.addEventListener("click", () => {
          window.location.reload();
        });
      }
    </script>
  </body>
</html>
